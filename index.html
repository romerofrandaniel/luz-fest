<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>María & Juan - Casamiento</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdfcf9;
    color: #333;
    scroll-behavior: smooth;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    text-align: center;
}

.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
}

.hero-content {
    position: relative;
    color: white;
    animation: fadeIn 2s ease;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.5em;
    letter-spacing: 3px;
}

.hero p {
    font-size: 1.2em;
}

/* COUNTDOWN */
.countdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.countdown div {
    font-size: 1.4em;
}

/* SECTIONS */
.section {
    padding: 70px 20px;
    text-align: center;
    max-width: 900px;
    margin: auto;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.section.visible {
    opacity: 1;
    transform: translateY(0);
}

h2 {
    font-family: 'Playfair Display', serif;
    letter-spacing: 2px;
}

/* BUTTON */
.button {
    padding: 12px 25px;
    border: 1px solid #c5a46d;
    color: #c5a46d;
    text-decoration: none;
    display: inline-block;
    margin-top: 20px;
    transition: 0.3s;
}

.button:hover {
    background: #c5a46d;
    color: white;
}

/* GALERIA */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 10px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
}

/* FORM */
input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
}

/* FOOTER */
.footer {
    padding: 50px;
    text-align: center;
    font-style: italic;
}

/* ANIMACION */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<!-- MÚSICA -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
window.onload = () => {
    document.body.addEventListener('click', () => {
        document.getElementById("music").play();
    }, {once:true});
}
</script>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <p>Nos casamos</p>
        <h1>María & Juan</h1>
        <p>29 de Noviembre 2025 - 21:30 hs</p>

        <div class="countdown">
            <div><span id="d">00</span><br>Días</div>
            <div><span id="h">00</span><br>Horas</div>
            <div><span id="m">00</span><br>Min</div>
            <div><span id="s">00</span><br>Seg</div>
        </div>
    </div>
</div>

<!-- EVENTO -->
<div class="section">
    <h2>Ceremonia & Recepción</h2>
    <p>Salón Gauna</p>
    <p>Puerto Vilelas</p>
    <a href="https://maps.google.com" class="button">Ver ubicación</a>
</div>

<!-- DRESS -->
<div class="section">
    <h2>Dress Code</h2>
    <p>Elegante Formal</p>
</div>

<!-- GALERIA -->
<div class="section">
    <h2>Nuestros Momentos</h2>
    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
        <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">
        <img src="https://images.unsplash.com/photo-1502673530728-f79b4cab31b1">
    </div>
</div>

<!-- RSVP -->
<div class="section">
    <h2>Confirmación</h2>
    <form onsubmit="enviar(event)">
        <input type="text" id="nombre" placeholder="Tu nombre" required><br>
        <textarea id="mensaje" placeholder="Mensaje"></textarea><br>
        <button class="button">Confirmar</button>
    </form>
</div>

<script>
function enviar(e){
    e.preventDefault();
    let nombre = document.getElementById("nombre").value;
    window.open(`https://wa.me/549XXXXXXXXXX?text=Confirmo asistencia: ${nombre}`);
}
</script>

<!-- REGALO -->
<div class="section">
    <h2>Regalo</h2>
    <p>Tu presencia es lo más importante 💕</p>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>Con amor</p>
    <h2>María & Juan</h2>
</div>

<!-- SCROLL ANIMATION -->
<script>
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            sec.classList.add("visible");
        }
    });
});
</script>

<!-- COUNTDOWN -->
<script>
const fecha = new Date("Nov 29, 2025 21:30:00").getTime();

setInterval(()=>{
    const ahora = new Date().getTime();
    const diff = fecha - ahora;

    document.getElementById("d").innerHTML = Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerHTML = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerHTML = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerHTML = Math.floor((diff%(1000*60))/1000);
},1000);
</script>

</body>
</html>
